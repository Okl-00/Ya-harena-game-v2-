<div class="profile-page animate-fade-in-up">
    <div class="container py-5">
        <!-- En-tête du profil -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card bg-dark text-white">
                    <div class="card-body">
                        <div class="row align-items-center">
                            <div class="col-md-2 text-center mb-3 mb-md-0">
                                <div class="avatar-container">
                                    <i class="fas fa-user-circle fa-5x text-warning"></i>
                                    <button class="btn btn-sm btn-outline-warning mt-2" onclick="casinoApp.changeAvatar()">
                                        <i class="fas fa-camera me-1"></i>Modifier
                                    </button>
                                </div>
                            </div>
                            <div class="col-md-7">
                                <h2 id="profileName">Chargement...</h2>
                                <p class="text-muted mb-1">
                                    <i class="fas fa-envelope me-2"></i>
                                    <span id="profileEmail"></span>
                                </p>
                                <p class="text-muted mb-1">
                                    <i class="fas fa-calendar me-2"></i>
                                    Membre depuis le <span id="profileDate"></span>
                                </p>
                                <p class="text-muted mb-0">
                                    <i class="fas fa-id-card me-2"></i>
                                    ID: <span id="profileId"></span>
                                </p>
                            </div>
                            <div class="col-md-3 text-center">
                                <div class="balance-card p-3" style="background: rgba(255,215,0,0.1); border-radius: 15px;">
                                    <h6 class="text-muted mb-2">Solde Actuel</h6>
                                    <h3 class="text-warning mb-0">
                                        <span class="user-balance">0</span> Ar
                                    </h3>
                                    <button class="btn btn-casino btn-sm mt-2" onclick="casinoApp.addFunds()">
                                        <i class="fas fa-plus-circle me-1"></i>Ajouter des fonds
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Statistiques détaillées -->
        <div class="row mb-4">
            <div class="col-lg-8">
                <div class="card bg-dark text-white mb-4">
                    <div class="card-header">
                        <h5 class="mb-0">
                            <i class="fas fa-chart-pie me-2"></i>Statistiques de Jeu
                        </h5>
                    </div>
                    <div class="card-body">
                        <div class="row text-center">
                            <div class="col-6 col-md-3 mb-3">
                                <div class="stat-card p-3" style="background: rgba(255,255,255,0.05); border-radius: 10px;">
                                    <i class="fas fa-gamepad fa-2x text-info mb-2"></i>
                                    <h4 id="statGames">0</h4>
                                    <p class="text-muted mb-0">Parties jouées</p>
                                </div>
                            </div>
                            <div class="col-6 col-md-3 mb-3">
                                <div class="stat-card p-3" style="background: rgba(255,255,255,0.05); border-radius: 10px;">
                                    <i class="fas fa-trophy fa-2x text-success mb-2"></i>
                                    <h4 id="statWins">0</h4>
                                    <p class="text-muted mb-0">Victoires</p>
                                </div>
                            </div>
                            <div class="col-6 col-md-3 mb-3">
                                <div class="stat-card p-3" style="background: rgba(255,255,255,0.05); border-radius: 10px;">
                                    <i class="fas fa-percent fa-2x text-primary mb-2"></i>
                                    <h4 id="statWinRate">0%</h4>
                                    <p class="text-muted mb-0">Taux de réussite</p>
                                </div>
                            </div>
                            <div class="col-6 col-md-3 mb-3">
                                <div class="stat-card p-3" style="background: rgba(255,255,255,0.05); border-radius: 10px;">
                                    <i class="fas fa-coins fa-2x text-warning mb-2"></i>
                                    <h4 id="statProfit">0 Ar</h4>
                                    <p class="text-muted mb-0">Profit net</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Graphiques -->
                <div class="card bg-dark text-white mb-4">
                    <div class="card-header">
                        <h5 class="mb-0">
                            <i class="fas fa-chart-bar me-2"></i>Performance par Type de Jeu
                        </h5>
                    </div>
                    <div class="card-body">
                        <canvas id="gamePerformanceChart" width="400" height="200"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <!-- Informations personnelles -->
                <div class="card bg-dark text-white mb-4">
                    <div class="card-header">
                        <h5 class="mb-0">
                            <i class="fas fa-user-edit me-2"></i>Informations Personnelles
                        </h5>
                    </div>
                    <div class="card-body">
                        <form id="profileForm">
                            <div class="mb-3">
                                <label class="form-label">Nom complet</label>
                                <input type="text" class="form-control bg-dark text-white" id="editName">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control bg-dark text-white" id="editEmail" readonly>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Téléphone</label>
                                <input type="tel" class="form-control bg-dark text-white" id="editPhone" placeholder="+261...">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Langue préférée</label>
                                <select class="form-select bg-dark text-white" id="editLanguage">
                                    <option value="fr">Français</option>
                                    <option value="mg">Malagasy</option>
                                    <option value="en">English</option>
                                </select>
                            </div>
                            <button type="button" class="btn btn-casino w-100" onclick="casinoApp.updateProfile()">
                                <i class="fas fa-save me-2"></i>Sauvegarder
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Badges et Récompenses -->
                <div class="card bg-dark text-white mb-4">
                    <div class="card-header">
                        <h5 class="mb-0">
                            <i class="fas fa-award me-2"></i>Badges & Récompenses
                        </h5>
                    </div>
                    <div class="card-body">
                        <div class="row text-center">
                            <div class="col-4 mb-3">
                                <div class="badge-item">
                                    <i class="fas fa-star fa-2x text-warning"></i>
                                    <p class="small mt-2 mb-0">Débutant</p>
                                </div>
                            </div>
                            <div class="col-4 mb-3">
                                <div class="badge-item opacity-50">
                                    <i class="fas fa-crown fa-2x text-muted"></i>
                                    <p class="small mt-2 mb-0">VIP</p>
                                </div>
                            </div>
                            <div class="col-4 mb-3">
                                <div class="badge-item opacity-50">
                                    <i class="fas fa-gem fa-2x text-muted"></i>
                                    <p class="small mt-2 mb-0">Légende</p>
                                </div>
                            </div>
                            <div class="col-4 mb-3">
                                <div class="badge-item">
                                    <i class="fas fa-fire fa-2x text-danger"></i>
                                    <p class="small mt-2 mb-0">Série</p>
                                </div>
                            </div>
                            <div class="col-4 mb-3 opacity-50">
                                <i class="fas fa-chess-queen fa-2x text-muted"></i>
                                <p class="small mt-2 mb-0">Expert</p>
                            </div>
                            <div class="col-4 mb-3 opacity-50">
                                <i class="fas fa-robot fa-2x text-muted"></i>
                                <p class="small mt-2 mb-0">Maître</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Options de sécurité -->
                <div class="card bg-dark text-white">
                    <div class="card-header">
                        <h5 class="mb-0">
                            <i class="fas fa-shield-alt me-2"></i>Sécurité
                        </h5>
                    </div>
                    <div class="card-body">
                        <button class="btn btn-outline-warning w-100 mb-2" onclick="casinoApp.changePassword()">
                            <i class="fas fa-key me-2"></i>Changer le mot de passe
                        </button>
                        <button class="btn btn-outline-info w-100 mb-2" onclick="casinoApp.enable2FA()">
                            <i class="fas fa-lock me-2"></i>Activer l'A2F
                        </button>
                        <button class="btn btn-outline-danger w-100" onclick="casinoApp.deleteAccount()">
                            <i class="fas fa-trash me-2"></i>Supprimer le compte
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .profile-page .stat-card {
        transition: all 0.3s ease;
    }
    
    .profile-page .stat-card:hover {
        transform: translateY(-5px);
        background: rgba(255, 215, 0, 0.1) !important;
    }
    
    .profile-page .badge-item {
        transition: all 0.3s ease;
    }
    
    .profile-page .badge-item:hover {
        transform: scale(1.1);
    }
    
    .profile-page .balance-card {
        border: 2px solid rgba(255, 215, 0, 0.2);
    }
    
    .profile-page .form-control:focus,
    .profile-page .form-select:focus {
        border-color: var(--accent-color);
        box-shadow: 0 0 0 0.2rem rgba(255, 215, 0, 0.25);
    }
    
    @media (max-width: 768px) {
        .profile-page .avatar-container {
            margin-bottom: 20px;
        }
        
        .profile-page .stat-card {
            margin-bottom: 15px;
        }
    }
</style>

<script>
    // Initialisation du graphique de performance par jeu
    document.addEventListener('DOMContentLoaded', function() {
        if (document.getElementById('gamePerformanceChart')) {
            const ctx = document.getElementById('gamePerformanceChart').getContext('2d');
            const chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Blackjack', 'Machines à Sous', 'Roulette', 'Poker', 'Jeux Malagasy'],
                    datasets: [{
                        data: [30, 25, 20, 15, 10],
                        backgroundColor: [
                            '#ffd700',
                            '#ff6b6b',
                            '#4ecdc4',
                            '#45b7d1',
                            '#96ceb4'
                        ],
                        borderColor: '#1a1a2e',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: '#ffffff',
                                padding: 20
                            }
                        }
                    }
                }
            });
            
            window.gamePerformanceChart = chart;
        }
        
        // Charger les données du profil
        if (window.casinoApp && window.casinoApp.loadProfile) {
            window.casinoApp.loadProfile();
        }
    });
</script>
