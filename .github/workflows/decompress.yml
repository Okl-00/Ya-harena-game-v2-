name: decompress and commit project

on:
  workflow_dispatch:

jobs:
  unzip-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/repair-zip
          fetch-depth: 0

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: List repo before
        run: ls -la

      - name: Unzip archive
        run: |
          if [ -f "ya-harena-game-v2.zip" ]; then
            unzip -o ya-harena-game-v2.zip -d extracted
          else
            echo "Archive ya-harena-game-v2.zip not found"
            exit 1
          fi

      - name: Show extracted structure
        run: ls -la extracted || true

      - name: Move extracted files to repo root
        run: |
          shopt -s dotglob || true
          if [ -d extracted ]; then
            for f in extracted/*; do
              echo "Moving $f" || true
              mv "$f" ./ || true
            done
          fi
          ls -la

      - name: Commit and push extracted files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Unzip project and add files from ya-harena-game-v2.zip"
            git push origin HEAD:fix/repair-zip
          fi

      - name: List final repo files
        run: ls -la
